name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy Backend + Frontend
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── Backend: Deploy via Serverless Framework ─────────────────────────────
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Deploy backend infrastructure + code
        run: serverless deploy --stage prod
        env:
          JWT_SECRET:     ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # Capture the API URL and frontend bucket from CloudFormation outputs
      - name: Get stack outputs
        id: stack
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name torn-march-madness-prod \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name torn-march-madness-prod \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          BUCKET_NAME="memm-frontend-${{ secrets.AWS_ACCOUNT_ID }}"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      # ── Frontend: Build and sync to S3 ───────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.stack.outputs.api_url }}

      - name: Sync HTML/CSS/JS with no-cache headers
        run: |
          aws s3 sync frontend/dist/ "s3://${{ steps.stack.outputs.bucket_name }}/" \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "assets/*"

      - name: Sync hashed assets with long-lived cache
        run: |
          aws s3 sync frontend/dist/assets/ "s3://${{ steps.stack.outputs.bucket_name }}/assets/" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Print deployment URLs
        run: |
          echo "Frontend: ${{ steps.stack.outputs.frontend_url }}"
          echo "API:      ${{ steps.stack.outputs.api_url }}/api/tournament"
