name: Deploy Backend to AWS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'serverless.yml'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── Backend: Deploy via Serverless Framework ─────────────────────────────
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Deploy backend infrastructure + code
        run: serverless deploy --stage prod
        env:
          JWT_SECRET:     ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Print API URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name torn-march-madness-prod \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "API: $API_URL/api/tournament"

# NOTE: Frontend is now deployed via Vercel (auto-deploys on push to main).
# See VERCEL-MIGRATION.md for details and rollback instructions.
